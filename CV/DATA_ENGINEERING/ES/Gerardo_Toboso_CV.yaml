cv:
  name: Gerardo Toboso
  headline: Ingeniero de Datos y Cloud | Arquitecto Serverless AWS | Sistemas Costo-Eficientes
  location: Buenos Aires, Argentina
  email: gerardotoboso1909@gmail.com
  phone: (+54) 911-4045-6207
  social_networks:
    - network: LinkedIn
      username: gerardo-toboso-512a48290
    - network: GitHub
      username: Gerardo1909

  sections:
    resumen:
      - Ingeniero de Datos y Cloud que construye sistemas serverless en AWS y diagnostica fallos a escala. En una fintech hipotecaria en EE. UU reduje 22M de llamadas redundantes por semana, aseguré 71M de registros y audité 268 incidentes de producción en 12 integraciones, identificando 27 causas raíz e implementando fixes que eliminaron más de 160 intervenciones manuales por parte del equipo cada mes.

    habilidades:
      - label: Arquitectura Cloud & Serverless
        details: AWS Lambda, DynamoDB, SQS, API Gateway, WebSockets, diseño event-driven, IAM y optimización de costos
      - label: Ingeniería de Datos, SQL & Procesamiento
        details: Python (pandas, PySpark, duckdb), PostgreSQL, desarrollo de ETL/ELT, Airflow, diseño idempotente, particionamiento Parquet y data contracts
      - label: Confiabilidad & Observabilidad
        details: CloudWatch, logging estructurado, alertas, testing automatizado con Pytest, freshness checks y detección de fallos
      - label: Idiomas
        details: Español (Nativo) | Inglés (Fluido - C2)

    experiencia:
      - company: Stealth Fintech (Plataforma hipotecaria en EE. UU.)
        position: Ingeniero de Software Fullstack | Arquitecto Cloud & Serverless
        location: Contrato · Buenos Aires Province, Argentina · Remoto
        start_date: 2024-01
        end_date: present
        highlights:
          - Reduje 22M de llamadas redundantes por semana corrigiendo una ineficiencia de polling de alta frecuencia y bajando el costo de AWS Lambda y DynamoDB.
          - Lideré una auditoría de seguridad para redactar credenciales OAuth y API Keys de 71M de registros históricos en DynamoDB y S3, y luego añadí redacción automática en el wrapper de comunicación.
          - Migré una interfaz basada en polling a una arquitectura event-driven con API Gateway WebSockets y DynamoDB Streams, logrando actualizaciones sub-2s para cambios críticos de estado.
          - Construí y mantuve un pipeline hipotecario que orquesta 50+ AWS Lambdas y 30+ APIs externas, reduciendo el cierre de préstamos de 30 días a menos de 7 y sirviendo a 200+ clientes con 99.9% de disponibilidad.
          - Realicé una auditoría estructurada de causas raíz sobre 268 incidentes de producción en 12 integraciones de terceros (Plaid, Docutech, Persona, Service Link) en 8,5 semanas, identifiqué 27 patrones de fallo y apliqué fixes que eliminaron más de 160 escalaciones manuales de soporte por ciclo.
          - Resolví un defecto crítico de validación de ingresos en Plaid reemplazando la comparación exacta de cadenas por normalización Unicode y similitud Jaro-Winkler, eliminando 57 tickets de soporte por ciclo, la clase de fallo más frecuente de la plataforma, sin necesidad de intervención manual tras el fix.
          - Implementé clasificación estructurada de errores y retry con backoff exponencial en la integración con Docutech, distinguiendo fallos de autenticación, errores de payload y caídas del servicio, convirtiendo 35 fallos opacos recurrentes por ciclo en incidentes auto-diagnosticables y auto-recuperables.
          - Resolví una race condition en el flujo de órdenes de Service Link donde timeouts de Lambda entre la creación en la API y la persistencia en DynamoDB borraban permanentemente los IDs de orden, reemplacé dobles escrituras con transacciones DynamoDB y retry con SQS, eliminando fallos en cascada en 3 handlers de webhook downstream.

    educación:
      - institution: Universidad Nacional de San Martín (UNSAM)
        area: Ciencia de Datos
        degree: Licenciatura
        location: Buenos Aires, Argentina
        start_date: 2022-07
        end_date: present
        highlights:
          - "75% completado — Promedio: 9.0 / 10"

