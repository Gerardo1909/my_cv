              location: "[GitHub](https://github.com/Gerardo1909/hotel-serverless-pipeline)"
              start_date: 2026-01
              end_date: 2026-02
              highlights:
                  - Construí un pipeline serverless en AWS con funciones Lambda en Python, detección de eventos en S3, EventBridge e imágenes de contenedor para dependencias pesadas.
                  - Codifiqué lógica de negocio y validación para enrutar el procesamiento según el evento, rechazar registros inválidos temprano y mantener idempotencia.
                  - Consolidé CSV en datasets Parquet listos para Athena con logging en CloudWatch y controles IAM de mínimo privilegio.

